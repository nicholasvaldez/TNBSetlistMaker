<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin — TNB Song Curator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111;
        color: #e5e5e5;
        padding: 2rem;
        max-width: 640px;
        margin: 0 auto;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.25rem;
      }
      .sub {
        color: #888;
        font-size: 0.85rem;
        margin-bottom: 2rem;
      }
      .card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 1.25rem;
        margin-bottom: 1rem;
      }
      .card h2 {
        font-size: 1rem;
        margin-bottom: 0.75rem;
        color: #ccc;
      }
      label {
        display: block;
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 0.25rem;
      }
      input[type="text"] {
        width: 100%;
        padding: 0.5rem;
        background: #222;
        border: 1px solid #444;
        border-radius: 4px;
        color: #e5e5e5;
        font-family: monospace;
        font-size: 0.85rem;
      }
      button {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .btn-primary {
        background: #e3c77a;
        color: #111;
      }
      .btn-primary:hover {
        background: #d4b85c;
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-secondary {
        background: #333;
        color: #ccc;
      }
      .btn-secondary:hover {
        background: #444;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .dot.on {
        background: #4a7a40;
      }
      .dot.off {
        background: #a04030;
      }
      .meta {
        font-size: 0.8rem;
        color: #888;
      }
      .actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      .playlist-list {
        list-style: none;
      }
      .playlist-list li {
        padding: 0.4rem 0;
        border-bottom: 1px solid #222;
        font-size: 0.85rem;
      }
      .toast {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: #e5e5e5;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        display: none;
      }
      .toast.show {
        display: block;
      }
      .success {
        border: 1px solid #4a7a40;
      }
    </style>
  </head>
  <body>
    <h1>TNB Song Curator</h1>
    <p class="sub">Admin Panel</p>

    <div class="card">
      <h2>API Key</h2>
      <label for="apiKey">Enter your admin key to unlock actions</label>
      <input type="text" id="apiKey" placeholder="paste-your-key-here" autocomplete="off" />
    </div>

    <div class="card">
      <h2>Spotify Connection</h2>
      <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Checking…</span>
      </div>
      <p class="meta" id="statusMeta"></p>
      <div class="actions">
        <button class="btn-primary" id="connectBtn" onclick="connectSpotify()">Connect Spotify</button>
        <button class="btn-secondary" id="refreshBtn" onclick="loadStatus()">Refresh</button>
      </div>
    </div>

    <div class="card">
      <h2>Playlist Sync</h2>
      <p class="meta" id="playlistCount"></p>
      <ul class="playlist-list" id="playlistList"></ul>
      <div class="actions">
        <button class="btn-primary" id="syncBtn" onclick="syncAll()">Sync Now</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const keyInput = document.getElementById("apiKey");
      const saved = localStorage.getItem("tnb_admin_key");
      if (saved) keyInput.value = saved;

      let debounceTimer;
      keyInput.addEventListener("input", () => {
        localStorage.setItem("tnb_admin_key", keyInput.value);
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          if (keyInput.value.trim()) {
            loadStatus();
            loadPlaylists();
          }
        }, 400);
      });

      function getKey() {
        return keyInput.value.trim();
      }

      async function apiFetch(path, opts = {}) {
        const key = getKey();
        if (!key) {
          toast("Enter your API key first");
          return null;
        }
        const res = await fetch(path, {
          ...opts,
          headers: { "X-Admin-Key": key, ...(opts.headers || {}) },
        });
        if (res.status === 401) {
          toast("Invalid API key");
          return null;
        }
        if (!res.ok) {
          toast(`Error: ${res.status}`);
          return null;
        }
        return res.json();
      }

      function toast(msg, success) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "toast show" + (success ? " success" : "");
        setTimeout(() => (el.className = "toast"), 3000);
      }

      async function loadStatus() {
        const data = await apiFetch("/api/spotify/status");
        if (!data) return;

        const dot = document.getElementById("statusDot");
        const text = document.getElementById("statusText");
        const meta = document.getElementById("statusMeta");

        dot.className = "dot " + (data.connected ? "on" : "off");
        text.textContent = data.connected ? "Connected" : "Not connected";
        meta.textContent = data.lastRefreshed ? "Last refreshed: " + new Date(data.lastRefreshed).toLocaleString() : "";

        document.getElementById("playlistCount").textContent =
          data.trackedPlaylists + " tracked playlist" + (data.trackedPlaylists !== 1 ? "s" : "");
      }

      async function loadPlaylists() {
        const data = await apiFetch("/api/spotify/playlists/tracked");
        if (!data) return;

        const list = document.getElementById("playlistList");
        list.innerHTML = data.map((p) => `<li>${p.name} <span class="meta">${p.spotifyId}</span></li>`).join("");
      }

      function connectSpotify() {
        const key = getKey();
        if (!key) {
          toast("Enter your API key first");
          return;
        }
        window.open("/api/spotify/login?key=" + encodeURIComponent(key), "_blank");
      }

      async function syncAll() {
        const btn = document.getElementById("syncBtn");
        btn.disabled = true;
        btn.textContent = "Syncing…";
        const data = await apiFetch("/api/spotify/sync-all", { method: "POST" });
        btn.disabled = false;
        btn.textContent = "Sync Now";
        if (data) toast("Sync jobs enqueued", true);
      }

      const params = new URLSearchParams(location.search);
      if (params.get("connected") === "true") {
        history.replaceState({}, "", "/admin");
        toast("Spotify connected successfully!", true);
      }

      if (getKey()) {
        loadStatus();
        loadPlaylists();
      }
    </script>
  </body>
</html>
